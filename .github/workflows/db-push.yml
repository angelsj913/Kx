name: Database schema push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  prisma-db-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: prisma db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL GitHub Actions secret is not set."
            echo "Add it at: Settings → Secrets and variables → Actions → New repository secret"
            echo "Value: Neon Postgres connection string (same as Vercel DATABASE_URL)"
            exit 1
          fi
          npx prisma db push --accept-data-loss
