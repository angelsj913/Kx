name: Build Windows Installer

# The desktop app is a thin Electron shell that just loads the deployed
# Vercel app (see electron/main.js) — it doesn't need `next build` output,
# only electron-builder + the electron/** files, so this workflow is fast
# and doesn't need any backend secrets (DB, Google OAuth, AI keys all live
# on Vercel, never inside the installer).
on:
  workflow_dispatch: {}

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run electron:build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Toolkit-Windows-Installer
          path: dist-electron/AI-Toolkit-Windows-Installer.exe
          if-no-files-found: error
