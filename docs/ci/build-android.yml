name: Build Android (Play Store AAB)

# Capacitor shell loads https://zeffai.com — no Next build or backend secrets needed.
on:
  workflow_dispatch: {}
  push:
    tags:
      - "android-v*"
    paths:
      - "android/**"
      - "mobile/**"
      - "capacitor.config.ts"
      - "package.json"
      - ".github/workflows/build-android.yml"

permissions:
  contents: write

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync
        run: npx cap sync android
        env:
          ZEFF_APP_URL: https://zeffai.com

      - name: Decode upload keystore (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret — building unsigned/debug-signed release bundle."
            echo "Add keystore secrets for Play-ready signed AAB."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/zeffai-upload.jks
          cat > android/keystore.properties <<EOF
          storeFile=zeffai-upload.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Build release AAB
        working-directory: android
        run: chmod +x gradlew && ./gradlew bundleRelease --stacktrace

      - name: Locate AAB
        id: aab
        run: |
          AAB=$(find android/app/build/outputs/bundle -name "*.aab" | head -1)
          echo "path=$AAB" >> "$GITHUB_OUTPUT"
          ls -la android/app/build/outputs/bundle/release/ || true

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeffai-android-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
